<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>EngQuest — учим английский играя</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2bb673">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EngQuest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
</head>
<body>

<header id="top-bar" class="top-bar hidden">
  <button id="btn-back" class="icon-btn" aria-label="Назад">←</button>
  <button id="btn-mute" class="icon-btn" aria-label="Звук">🔊</button>
  <button id="btn-voice" class="icon-btn" aria-label="Голос">🎙️</button>
  <div class="stat" id="stat-hearts-row"><span class="stat-icon">❤️</span><span id="stat-hearts">5</span></div>
  <div class="stat" id="stat-xp-row"><span class="stat-icon">⭐</span><span id="stat-xp">0</span></div>
  <div class="stat" id="stat-streak-row"><span class="stat-icon">🔥</span><span id="stat-streak">0</span></div>
</header>

<main id="app"></main>
<div id="toast-host" class="toast-host"></div>

<script src="data/units.js"></script>
<script src="js/progress.js"></script>
<script src="js/srs.js"></script>
<script src="js/sound.js"></script>
<script src="js/achievements.js"></script>
<script src="js/journal.js"></script>
<script src="js/speech.js"></script>
<script src="js/exercises.js"></script>
<script src="js/lesson.js"></script>
<script src="js/main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>
</body>
</html>
